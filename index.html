<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterFire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }
        
        .game-title {
            text-align: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        
        h1 {
            color: #ff4757;
            font-size: 36px;
            text-shadow: 0 0 15px #ff4757, 0 0 30px #ff4757;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }
        
        .subtitle {
            color: #70a1ff;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto;
        }
        
        #gameCanvas {
            background: #0f3460;
            display: block;
            width: 100%;
            height: 100%;
            border: 3px solid #1e90ff;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(30, 144, 255, 0.5);
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-top: 15px;
            padding: 0 10px;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #1e90ff;
            min-width: 150px;
            text-align: center;
        }
        
        .stat-label {
            color: #70a1ff;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #ffa502;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffa502;
        }
        
        .health-container {
            width: 200px;
            margin: 10px auto;
        }
        
        .health-bar {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff4757;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #2ed573);
            width: 100%;
            transition: width 0.3s;
        }
        
        .controls-info {
            text-align: center;
            margin-top: 15px;
            color: #70a1ff;
            font-size: 14px;
            padding: 0 10px;
        }
        
        /* Мобильные контролы */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 10;
        }
        
        .movement-area {
            width: 150px;
            height: 150px;
            pointer-events: auto;
            position: relative;
        }
        
        .movement-pad {
            width: 100%;
            height: 100%;
            background: rgba(30, 144, 255, 0.2);
            border-radius: 50%;
            border: 2px solid #1e90ff;
            position: absolute;
        }
        
        .movement-handle {
            width: 60px;
            height: 60px;
            background: #1e90ff;
            border-radius: 50%;
            position: absolute;
            top: 45px;
            left: 45px;
            box-shadow: 0 0 20px #1e90ff;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px;
        }
        
        .shoot-btn {
            background: linear-gradient(145deg, #ff4757, #ff3838);
            box-shadow: 0 0 20px #ff4757;
        }
        
        .shoot-btn:active {
            background: linear-gradient(145deg, #ff3838, #ff4757);
            transform: scale(0.95);
        }
        
        /* Экран паузы и game over */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .screen h2 {
            color: #ffa502;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ffa502;
        }
        
        .screen p {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(145deg, #1e90ff, #3742fa);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 20px #1e90ff;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .restart-btn {
            background: linear-gradient(145deg, #ff4757, #ff3838);
            box-shadow: 0 0 20px #ff4757;
        }
        
        /* Панель управления на ПК */
        .pc-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        
        .key {
            background: rgba(0, 0, 0, 0.7);
            color: #70a1ff;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #1e90ff;
            font-size: 14px;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .game-container {
                height: 60vh;
                max-height: 400px;
            }
            
            .mobile-controls {
                display: flex;
            }
            
            .stats-panel {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            
            .stat {
                min-width: 120px;
                padding: 8px 15px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .movement-area {
                width: 120px;
                height: 120px;
            }
            
            .movement-handle {
                width: 50px;
                height: 50px;
                top: 35px;
                left: 35px;
            }
            
            .action-btn {
                width: 70px;
                height: 70px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .game-container {
                height: 50vh;
            }
            
            .movement-area {
                width: 100px;
                height: 100px;
            }
            
            .movement-handle {
                width: 40px;
                height: 40px;
                top: 30px;
                left: 30px;
            }
            
            .action-btn {
                width: 60px;
                height: 60px;
                font-size: 12px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .screen h2 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-title">
        <h1>MONSTERFIRE</h1>
        <div class="subtitle">Уничтожай монстров, выживай как можно дольше!</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Мобильное управление -->
        <div class="mobile-controls">
            <div class="movement-area" id="movementArea">
                <div class="movement-pad"></div>
                <div class="movement-handle" id="movementHandle"></div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn shoot-btn" id="mobileShootBtn">FIRE</button>
            </div>
        </div>
        
        <!-- Экран паузы -->
        <div class="screen" id="pauseScreen">
            <h2>ПАУЗА</h2>
            <p>Игра на паузе</p>
            <button class="btn" id="resumeBtn">ПРОДОЛЖИТЬ</button>
            <button class="btn restart-btn" id="pauseRestartBtn">ЗАНОВО</button>
        </div>
        
        <!-- Экран game over -->
        <div class="screen" id="gameOverScreen">
            <h2>ИГРА ОКОНЧЕНА</h2>
            <p>Ваш счет: <span id="finalScore" style="color:#ffa502;">0</span></p>
            <p>Убито монстров: <span id="finalKills" style="color:#ffa502;">0</span></p>
            <button class="btn restart-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
        </div>
    </div>
    
    <div class="stats-panel">
        <div class="stat">
            <div class="stat-label">ЗДОРОВЬЕ</div>
            <div class="stat-value" id="healthValue">100</div>
            <div class="health-container">
                <div class="health-bar">
                    <div class="health-fill" id="healthFill"></div>
                </div>
            </div>
        </div>
        
        <div class="stat">
            <div class="stat-label">СЧЁТ</div>
            <div class="stat-value" id="scoreValue">0</div>
        </div>
        
        <div class="stat">
            <div class="stat-label">УБИТО</div>
            <div class="stat-value" id="killsValue">0</div>
        </div>
        
        <div class="stat">
            <div class="stat-label">ВОЛНА</div>
            <div class="stat-value" id="waveValue">1</div>
        </div>
    </div>
    
    <div class="controls-info">
        <div class="pc-controls">
            <div class="key">WASD / Стрелки</div>
            <div class="key">ЛКМ / Пробел</div>
            <div class="key">P - Пауза</div>
            <div class="key">R - Рестарт</div>
        </div>
        <div style="margin-top: 10px;">Двигайся и стреляй в монстров!</div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 500,
            PLAYER: {
                RADIUS: 20,
                SPEED: 6,
                COLOR: '#2ed573',
                HEALTH: 100
            },
            BULLET: {
                RADIUS: 6,
                SPEED: 12,
                COLOR: '#ffa502',
                DAMAGE: 25
            },
            MONSTERS: {
                NORMAL: { RADIUS: 15, SPEED: 1.5, COLOR: '#ff4757', HEALTH: 1, SCORE: 10 },
                FAST: { RADIUS: 12, SPEED: 2.5, COLOR: '#ff9ff3', HEALTH: 1, SCORE: 20 },
                TANK: { RADIUS: 25, SPEED: 0.8, COLOR: '#ff9f43', HEALTH: 3, SCORE: 50 }
            }
        };
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;
        
        // UI элементы
        const healthValue = document.getElementById('healthValue');
        const scoreValue = document.getElementById('scoreValue');
        const killsValue = document.getElementById('killsValue');
        const waveValue = document.getElementById('waveValue');
        const healthFill = document.getElementById('healthFill');
        const finalScore = document.getElementById('finalScore');
        const finalKills = document.getElementById('finalKills');
        
        // Экранные элементы
        const pauseScreen = document.getElementById('pauseScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pauseRestartBtn = document.getElementById('pauseRestartBtn');
        
        // Мобильные элементы управления
        const mobileShootBtn = document.getElementById('mobileShootBtn');
        const movementHandle = document.getElementById('movementHandle');
        
        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let gameState = {
            player: {
                x: CONFIG.CANVAS_WIDTH / 2,
                y: CONFIG.CANVAS_HEIGHT / 2,
                radius: CONFIG.PLAYER.RADIUS,
                speed: CONFIG.PLAYER.SPEED,
                health: CONFIG.PLAYER.HEALTH,
                maxHealth: CONFIG.PLAYER.HEALTH,
                color: CONFIG.PLAYER.COLOR
            },
            bullets: [],
            monsters: [],
            particles: [],
            keys: {},
            mouse: { x: 0, y: 0, down: false },
            touch: { x: 0, y: 0, active: false },
            score: 0,
            kills: 0,
            wave: 1,
            running: true,
            paused: false,
            lastShot: 0,
            shotCooldown: 200,
            monsterSpawnTimer: 0,
            monsterSpawnRate: 1000,
            gameLoopId: null
        };
        
        // ========== УПРАВЛЕНИЕ ==========
        
        // Клавиатура
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            gameState.keys[key] = true;
            
            // Быстрые команды
            switch(key) {
                case 'r': restartGame(); break;
                case 'p': togglePause(); break;
                case ' ': createBullet(); break; // Пробел
                case 'escape': if (gameState.paused) togglePause(); break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
        });
        
        // Мышь
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouse.x = e.clientX - rect.left;
            gameState.mouse.y = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                gameState.mouse.down = true;
                createBullet();
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) gameState.mouse.down = false;
        });
        
        // Сенсорное управление
        let touchJoystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, radius: 60 };
        
        mobileShootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createBullet();
        });
        
        const movementArea = document.getElementById('movementArea');
        movementArea.addEventListener('touchstart', handleTouchStart);
        document.addEventListener('touchmove', handleTouchMove);
        document.addEventListener('touchend', handleTouchEnd);
        
        function handleTouchStart(e) {
            e.preventDefault();
            touchJoystick.active = true;
            const rect = movementArea.getBoundingClientRect();
            touchJoystick.startX = rect.left + rect.width / 2;
            touchJoystick.startY = rect.top + rect.height / 2;
            updateTouchJoystick(e.touches[0]);
        }
        
        function handleTouchMove(e) {
            if (touchJoystick.active) {
                e.preventDefault();
                updateTouchJoystick(e.touches[0]);
            }
        }
        
        function handleTouchEnd(e) {
            if (touchJoystick.active) {
                touchJoystick.active = false;
                movementHandle.style.transform = 'translate(0, 0)';
                gameState.touch.x = 0;
                gameState.touch.y = 0;
            }
        }
        
        function updateTouchJoystick(touch) {
            const deltaX = touch.clientX - touchJoystick.startX;
            const deltaY = touch.clientY - touchJoystick.startY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angle = Math.atan2(deltaY, deltaX);
            
            if (distance > touchJoystick.radius) {
                touchJoystick.currentX = Math.cos(angle) * touchJoystick.radius;
                touchJoystick.currentY = Math.sin(angle) * touchJoystick.radius;
            } else {
                touchJoystick.currentX = deltaX;
                touchJoystick.currentY = deltaY;
            }
            
            movementHandle.style.transform = `translate(${touchJoystick.currentX}px, ${touchJoystick.currentY}px)`;
            
            gameState.touch.x = touchJoystick.currentX / touchJoystick.radius;
            gameState.touch.y = touchJoystick.currentY / touchJoystick.radius;
            gameState.touch.active = true;
        }
        
        // Кнопки UI
        resumeBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);
        pauseRestartBtn.addEventListener('click', restartGame);
        
        // ========== ИГРОВЫЕ ФУНКЦИИ ==========
        
        function updatePlayer() {
            const p = gameState.player;
            
            // Определяем направление движения
            let moveX = 0, moveY = 0;
            
            // Клавиатура
            if (gameState.keys['w'] || gameState.keys['arrowup']) moveY -= 1;
            if (gameState.keys['s'] || gameState.keys['arrowdown']) moveY += 1;
            if (gameState.keys['a'] || gameState.keys['arrowleft']) moveX -= 1;
            if (gameState.keys['d'] || gameState.keys['arrowright']) moveX += 1;
            
            // Сенсорное управление
            if (gameState.touch.active) {
                moveX = gameState.touch.x;
                moveY = gameState.touch.y;
            }
            
            // Нормализация вектора
            const magnitude = Math.sqrt(moveX * moveX + moveY * moveY);
            if (magnitude > 0) {
                moveX /= magnitude;
                moveY /= magnitude;
            }
            
            // Движение
            p.x += moveX * p.speed;
            p.y += moveY * p.speed;
            
            // Границы
            p.x = Math.max(p.radius, Math.min(CONFIG.CANVAS_WIDTH - p.radius, p.x));
            p.y = Math.max(p.radius, Math.min(CONFIG.CANVAS_HEIGHT - p.radius, p.y));
            
            // Автострельба
            if (gameState.mouse.down) {
                createBullet();
            }
            
            // Обновление UI
            healthValue.textContent = p.health;
            healthFill.style.width = (p.health / p.maxHealth * 100) + '%';
            scoreValue.textContent = gameState.score;
            killsValue.textContent = gameState.kills;
            waveValue.textContent = gameState.wave;
        }
        
        function createBullet() {
            if (!gameState.running || gameState.paused) return;
            
            const now = Date.now();
            if (now - gameState.lastShot < gameState.shotCooldown) return;
            gameState.lastShot = now;
            
            const p = gameState.player;
            let targetX = gameState.mouse.x || p.x;
            let targetY = gameState.mouse.y || 0;
            
            const dx = targetX - p.x;
            const dy = targetY - p.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance === 0) return;
            
            const vx = dx / distance * CONFIG.BULLET.SPEED;
            const vy = dy / distance * CONFIG.BULLET.SPEED;
            
            gameState.bullets.push({
                x: p.x,
                y: p.y,
                radius: CONFIG.BULLET.RADIUS,
                vx: vx,
                vy: vy,
                color: CONFIG.BULLET.COLOR,
                damage: CONFIG.BULLET.DAMAGE
            });
            
            playSound('shoot');
        }
        
        function createMonster() {
            if (!gameState.running || gameState.paused) return;
            
            // Случайная сторона
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: x = -40; y = Math.random() * CONFIG.CANVAS_HEIGHT; break;
                case 1: x = CONFIG.CANVAS_WIDTH + 40; y = Math.random() * CONFIG.CANVAS_HEIGHT; break;
                case 2: x = Math.random() * CONFIG.CANVAS_WIDTH; y = -40; break;
                case 3: x = Math.random() * CONFIG.CANVAS_WIDTH; y = CONFIG.CANVAS_HEIGHT + 40; break;
            }
            
            // Тип монстра
            let type;
            const rand = Math.random();
            
            if (gameState.wave >= 5 && rand < 0.15) {
                type = 'TANK';
            } else if (gameState.wave >= 3 && rand < 0.35) {
                type = 'FAST';
            } else {
                type = 'NORMAL';
            }
            
            const config = CONFIG.MONSTERS[type];
            const healthMultiplier = Math.max(1, Math.floor(gameState.wave / 3));
            
            const monster = {
                x: x,
                y: y,
                radius: config.RADIUS,
                speed: config.SPEED + (gameState.wave * 0.05),
                color: config.COLOR,
                health: config.HEALTH * healthMultiplier,
                maxHealth: config.HEALTH * healthMultiplier,
                type: type,
                score: config.SCORE
            };
            
            // Особые способности в зависимости от типа
            if (type === 'FAST') {
                monster.speed *= 1.5;
            } else if (type === 'TANK') {
                monster.radius *= 1.2;
            }
            
            gameState.monsters.push(monster);
        }
        
        function updateBullets() {
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                // Удаление за экраном
                if (bullet.x < -50 || bullet.x > CONFIG.CANVAS_WIDTH + 50 ||
                    bullet.y < -50 || bullet.y > CONFIG.CANVAS_HEIGHT + 50) {
                    gameState.bullets.splice(i, 1);
                    continue;
                }
                
                // Проверка столкновений с монстрами
                for (let j = gameState.monsters.length - 1; j >= 0; j--) {
                    const monster = gameState.monsters[j];
                    
                    const dx = bullet.x - monster.x;
                    const dy = bullet.y - monster.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < bullet.radius + monster.radius) {
                        // Попадание!
                        monster.health -= bullet.damage;
                        createParticles(bullet.x, bullet.y, bullet.color, 3);
                        
                        gameState.bullets.splice(i, 1);
                        
                        if (monster.health <= 0) {
                            // Убийство монстра
                            gameState.score += monster.score;
                            gameState.kills++;
                            
                            createParticles(monster.x, monster.y, monster.color, 15);
                            playSound('death');
                            
                            gameState.monsters.splice(j, 1);
                            
                            // Проверка конца волны
                            if (gameState.monsters.length === 0) {
                                gameState.wave++;
                                spawnWave();
                            }
                        } else {
                            playSound('hit');
                        }
                        break;
                    }
                }
            }
        }
        
        function spawnWave() {
            const count = 5 + gameState.wave * 2;
            for (let i = 0; i < count; i++) {
                setTimeout(() => createMonster(), i * 500);
            }
        }
        
        function updateMonsters() {
            const p = gameState.player;
            
            for (let i = gameState.monsters.length - 1; i >= 0; i--) {
                const monster = gameState.monsters[i];
                
                // Движение к игроку
                const dx = p.x - monster.x;
                const dy = p.y - monster.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 0) {
                    monster.x += dx / distance * monster.speed;
                    monster.y += dy / distance * monster.speed;
                }
                
                // Столкновение с игроком
                const playerDistance = Math.sqrt(
                    Math.pow(p.x - monster.x, 2) + 
                    Math.pow(p.y - monster.y, 2)
                );
                
                if (playerDistance < p.radius + monster.radius) {
                    // Урон игроку
                    const damage = monster.type === 'TANK' ? 25 : 15;
                    p.health -= damage;
                    
                    createParticles(monster.x, monster.y, '#ff4757', 10);
                    gameState.monsters.splice(i, 1);
                    gameState.kills++;
                    gameState.score += 5;
                    
                    playSound('hit');
                    
                    if (p.health <= 0) {
                        p.health = 0;
                        gameOver();
                    }
                }
            }
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30
                });
            }
        }
        
        function updateParticles() {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }
        
        // ========== ОТРИСОВКА ==========
        
        function drawBackground() {
            // Градиентный фон
            const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            gradient.addColorStop(0, '#0f3460');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // Сетка
            ctx.strokeStyle = 'rgba(30, 144, 255, 0.1)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x < CONFIG.CANVAS_WIDTH; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CONFIG.CANVAS_HEIGHT);
                ctx.stroke();
            }
            
            for (let y = 0; y < CONFIG.CANVAS_HEIGHT; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CONFIG.CANVAS_WIDTH, y);
                ctx.stroke();
            }
        }
        
        function drawPlayer() {
            const p = gameState.player;
            
            // Тень
            ctx.beginPath();
            ctx.arc(p.x, p.y + 5, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();
            
            // Основной круг
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            
            // Обводка
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Глаз
            const angle = Math.atan2(gameState.mouse.y - p.y, gameState.mouse.x - p.x);
            const eyeX = p.x + Math.cos(angle) * p.radius * 0.6;
            const eyeY = p.y + Math.sin(angle) * p.radius * 0.6;
            
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, p.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, p.radius * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            // Свечение
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius + 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(46, 213, 115, 0.3)';
            ctx.fill();
        }
        
        function drawBullets() {
            for (const bullet of gameState.bullets) {
                // Свечение
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 165, 2, 0.2)';
                ctx.fill();
                
                // Пуля
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fillStyle = bullet.color;
                ctx.fill();
                
                // Обводка
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function drawMonsters() {
            for (const monster of gameState.monsters) {
                // Тень
                ctx.beginPath();
                ctx.arc(monster.x, monster.y + 5, monster.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();
                
                // Тело монстра
                ctx.beginPath();
                ctx.arc(monster.x, monster.y, monster.radius, 0, Math.PI * 2);
                ctx.fillStyle = monster.color;
                ctx.fill();
                
                // Обводка
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Глаз
                const dx = gameState.player.x - monster.x;
                const dy = gameState.player.y - monster.y;
                const angle = Math.atan2(dy, dx);
                const eyeX = monster.x + Math.cos(angle) * monster.radius * 0.5;
                const eyeY = monster.y + Math.sin(angle) * monster.radius * 0.5;
                
                ctx.beginPath();
                ctx.arc(eyeX, eyeY, monster.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(eyeX, eyeY, monster.radius * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                
                // Зубы (для страшных монстров)
                if (monster.type === 'TANK') {
                    for (let i = 0; i < 8; i++) {
                        const toothAngle = (i / 8) * Math.PI * 2;
                        const toothX = monster.x + Math.cos(toothAngle) * monster.radius * 0.8;
                        const toothY = monster.y + Math.sin(toothAngle) * monster.radius * 0.8;
                        
                        ctx.beginPath();
                        ctx.arc(toothX, toothY, monster.radius * 0.15, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    }
                }
                
                // Полоска здоровья для танков
                if (monster.type === 'TANK' || monster.maxHealth > 1) {
                    const healthPercent = monster.health / monster.maxHealth;
                    const barWidth = monster.radius * 2;
                    
                    ctx.fillStyle = '#ff4757';
                    ctx.fillRect(monster.x - monster.radius, monster.y - monster.radius - 15, barWidth, 6);
                    
                    ctx.fillStyle = '#2ed573';
                    ctx.fillRect(monster.x - monster.radius, monster.y - monster.radius - 15, barWidth * healthPercent, 6);
                }
                
                // Свечение
                ctx.beginPath();
                ctx.arc(monster.x, monster.y, monster.radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = monster.type === 'TANK' ? 'rgba(255, 159, 67, 0.3)' :
                               monster.type === 'FAST' ? 'rgba(255, 159, 243, 0.3)' :
                               'rgba(255, 71, 87, 0.3)';
                ctx.fill();
            }
        }
        
        function drawParticles() {
            for (const p of gameState.particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        // ========== ЗВУКИ ==========
        
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                switch(type) {
                    case 'shoot':
                        oscillator.frequency.value = 900;
                        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.1);
                        break;
                        
                    case 'death':
                        oscillator.frequency.value = 200;
                        gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.5);
                        break;
                        
                    case 'hit':
                        oscillator.frequency.value = 400;
                        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.2);
                        break;
                }
            } catch (e) {
                console.log("Звук не поддерживается");
            }
        }
        
        // ========== ИГРОВОЙ ЦИКЛ ==========
        
        function gameLoop() {
            if (!gameState.running || gameState.paused) return;
            
            // Очистка
            drawBackground();
            
            // Обновление
            updatePlayer();
            updateBullets();
            updateMonsters();
            updateParticles();
            
            // Отрисовка
            drawParticles();
            drawBullets();
            drawMonsters();
            drawPlayer();
            
            // Спавн монстров
            const now = Date.now();
            if (now - gameState.monsterSpawnTimer > gameState.monsterSpawnRate) {
                createMonster();
                gameState.monsterSpawnTimer = now;
                gameState.monsterSpawnRate = Math.max(300, 1000 - gameState.wave * 30);
            }
            
            // Продолжаем цикл
            gameState.gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState.running = false;
            finalScore.textContent = gameState.score;
            finalKills.textContent = gameState.kills;
            gameOverScreen.style.display = 'flex';
            
            if (gameState.gameLoopId) {
                cancelAnimationFrame(gameState.gameLoopId);
            }
        }
        
        function restartGame() {
            // Сброс игрока
            gameState.player.x = CONFIG.CANVAS_WIDTH / 2;
            gameState.player.y = CONFIG.CANVAS_HEIGHT / 2;
            gameState.player.health = gameState.player.maxHealth;
            
            // Очистка массивов
            gameState.bullets = [];
            gameState.monsters = [];
            gameState.particles = [];
            
            // Сброс статистики
            gameState.score = 0;
            gameState.kills = 0;
            gameState.wave = 1;
            gameState.running = true;
            gameState.paused = false;
            
            // Скрываем экраны
            pauseScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Обновляем UI
            healthValue.textContent = gameState.player.health;
            healthFill.style.width = '100%';
            scoreValue.textContent = gameState.score;
            killsValue.textContent = gameState.kills;
            waveValue.textContent = gameState.wave;
            
            // Перезапускаем игровой цикл
            if (gameState.gameLoopId) {
                cancelAnimationFrame(gameState.gameLoopId);
            }
            gameLoop();
            
            // Начинаем с первой волны
            spawnWave();
        }
        
        function togglePause() {
            gameState.paused = !gameState.paused;
            pauseScreen.style.display = gameState.paused ? 'flex' : 'none';
            
            if (!gameState.paused && gameState.running) {
                gameLoop();
            }
        }
        
        // ========== ЗАПУСК ИГРЫ ==========
        
        // Автонастройка для мобильных
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        if (isMobile()) {
            gameState.player.speed = 8;
            gameState.shotCooldown = 300;
        }
        
        // Начало игры
        restartGame();
        
        // Фокус на окне
        window.addEventListener('focus', () => {
            if (!gameState.paused && gameState.running) {
                gameLoop();
            }
        });
    </script>
