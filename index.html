<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterFire 3D - FPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: crosshair;
        }
        
        /* Оружие внизу экрана */
        .weapon-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        
        .weapon {
            width: 400px;
            height: 200px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200"><defs><linearGradient id="gunGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2c3e50"/><stop offset="100%" style="stop-color:#34495e"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="5"/></filter><radialGradient id="muzzleGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#ffa502;stop-opacity:1"/><stop offset="100%" style="stop-color:#ffa502;stop-opacity:0"/></radialGradient></defs><rect x="100" y="50" width="200" height="60" rx="10" fill="url(%23gunGrad)" filter="url(%23shadow)"/><rect x="120" y="110" width="160" height="40" rx="8" fill="%23344a5e"/><rect x="280" y="60" width="60" height="40" rx="5" fill="%232c3e50"/><rect x="340" y="65" width="40" height="30" rx="3" fill="%237f8c8d"/><rect x="70" y="65" width="30" height="30" rx="5" fill="%23e74c3c"/><circle cx="370" cy="80" r="5" fill="%23ffa502"/><circle cx="85" cy="80" r="3" fill="%23ecf0f1"/><path d="M150,70 L180,50 L180,90 Z" fill="%231e90ff"/><circle id="muzzleFlash" cx="380" cy="80" r="15" fill="url(%23muzzleGrad)" opacity="0"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: translateY(20px);
            transition: transform 0.1s;
        }
        
        .weapon.shooting {
            transform: translateY(20px) scale(0.95);
        }
        
        /* Кроссхаир */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            z-index: 99;
            pointer-events: none;
        }
        
        .crosshair:before,
        .crosshair:after {
            content: '';
            position: absolute;
            background: #ff4757;
            box-shadow: 0 0 3px rgba(255, 71, 87, 0.8);
        }
        
        .crosshair:before {
            width: 20px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .crosshair:after {
            width: 4px;
            height: 20px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* HUD элементы */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .health-ammo {
            display: flex;
            gap: 20px;
        }
        
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid #1e90ff;
            backdrop-filter: blur(5px);
            min-width: 150px;
        }
        
        .hud-label {
            color: #70a1ff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .hud-value {
            color: #ffa502;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffa502;
        }
        
        .health-bar-container {
            width: 100%;
            margin-top: 10px;
        }
        
        .health-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 71, 87, 0.3);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #2ed573);
            width: 100%;
            transition: width 0.3s;
        }
        
        .wave-info {
            display: flex;
            gap: 20px;
        }
        
        /* Мобильные контролы */
        .mobile-controls {
            position: absolute;
            bottom: 200px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 101;
        }
        
        .movement-area {
            width: 150px;
            height: 150px;
            pointer-events: auto;
            position: relative;
        }
        
        .movement-pad {
            width: 100%;
            height: 100%;
            background: rgba(30, 144, 255, 0.2);
            border-radius: 50%;
            border: 2px solid #1e90ff;
            position: absolute;
        }
        
        .movement-handle {
            width: 60px;
            height: 60px;
            background: #1e90ff;
            border-radius: 50%;
            position: absolute;
            top: 45px;
            left: 45px;
            box-shadow: 0 0 20px #1e90ff;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px;
            cursor: pointer;
            background: linear-gradient(145deg, #ff4757, #ff3838);
            box-shadow: 0 0 20px #ff4757;
        }
        
        .action-btn:active {
            background: linear-gradient(145deg, #ff3838, #ff4757);
            transform: scale(0.95);
        }
        
        /* Экран паузы и game over */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        
        .screen h2 {
            color: #ffa502;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ffa502;
        }
        
        .screen p {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(145deg, #1e90ff, #3742fa);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 20px #1e90ff;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .restart-btn {
            background: linear-gradient(145deg, #ff4757, #ff3838);
            box-shadow: 0 0 20px #ff4757;
        }
        
        /* Эффект получения урона */
        .damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 71, 87, 0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 98;
            transition: opacity 0.3s;
        }
        
        /* Инструкция */
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #70a1ff;
            font-size: 12px;
            z-index: 100;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                bottom: 220px;
            }
            
            .weapon {
                width: 300px;
                height: 150px;
            }
            
            .hud {
                flex-direction: column;
                gap: 10px;
            }
            
            .health-ammo {
                width: 100%;
                justify-content: space-between;
            }
            
            .wave-info {
                width: 100%;
                justify-content: space-between;
            }
            
            .hud-panel {
                min-width: 120px;
                padding: 10px 15px;
            }
            
            .hud-value {
                font-size: 24px;
            }
            
            .instructions {
                display: none;
            }
            
            .movement-area {
                width: 120px;
                height: 120px;
            }
            
            .movement-handle {
                width: 50px;
                height: 50px;
                top: 35px;
                left: 35px;
            }
            
            .action-btn {
                width: 70px;
                height: 70px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .weapon {
                width: 250px;
                height: 125px;
            }
            
            .mobile-controls {
                bottom: 180px;
            }
            
            .hud-panel {
                min-width: 100px;
                padding: 8px 12px;
            }
            
            .hud-value {
                font-size: 20px;
            }
            
            .movement-area {
                width: 100px;
                height: 100px;
            }
            
            .movement-handle {
                width: 40px;
                height: 40px;
                top: 30px;
                left: 30px;
            }
            
            .action-btn {
                width: 60px;
                height: 60px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    
    <!-- HUD интерфейс -->
    <div class="hud">
        <div class="health-ammo">
            <div class="hud-panel">
                <div class="hud-label">ЗДОРОВЬЕ</div>
                <div class="hud-value" id="healthValue">100</div>
                <div class="health-bar-container">
                    <div class="health-bar">
                        <div class="health-fill" id="healthFill"></div>
                    </div>
                </div>
            </div>
            
            <div class="hud-panel">
                <div class="hud-label">ПАТРОНЫ</div>
                <div class="hud-value" id="ammoValue">∞</div>
            </div>
        </div>
        
        <div class="wave-info">
            <div class="hud-panel">
                <div class="hud-label">СЧЁТ</div>
                <div class="hud-value" id="scoreValue">0</div>
            </div>
            
            <div class="hud-panel">
                <div class="hud-label">ВОЛНА</div>
                <div class="hud-value" id="waveValue">1</div>
            </div>
            
            <div class="hud-panel">
                <div class="hud-label">УБИТО</div>
                <div class="hud-value" id="killsValue">0</div>
            </div>
        </div>
    </div>
    
    <!-- Кроссхаир -->
    <div class="crosshair"></div>
    
    <!-- Оружие -->
    <div class="weapon-container">
        <div class="weapon" id="weapon"></div>
    </div>
    
    <!-- Мобильные контролы -->
    <div class="mobile-controls">
        <div class="movement-area" id="movementArea">
            <div class="movement-pad"></div>
            <div class="movement-handle" id="movementHandle"></div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="mobileShootBtn">FIRE</button>
        </div>
    </div>
    
    <!-- Эффект урона -->
    <div class="damage-overlay" id="damageOverlay"></div>
    
    <!-- Инструкция -->
    <div class="instructions">
        WASD - Движение | Мышь - Вращение/Прицеливание | ЛКМ - Выстрел | R - Рестарт | P - Пауза
    </div>
    
    <!-- Экран паузы -->
    <div class="screen" id="pauseScreen">
        <h2>ПАУЗА</h2>
        <p>Игра на паузе</p>
        <button class="btn" id="resumeBtn">ПРОДОЛЖИТЬ</button>
        <button class="btn restart-btn" id="pauseRestartBtn">ЗАНОВО</button>
    </div>
    
    <!-- Экран game over -->
    <div class="screen" id="gameOverScreen">
        <h2>ИГРА ОКОНЧЕНА</h2>
        <p>Ваш счет: <span id="finalScore" style="color:#ffa502;">0</span></p>
        <p>Убито монстров: <span id="finalKills" style="color:#ffa502;">0</span></p>
        <button class="btn restart-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
    </div>

    <!-- Three.js библиотека -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const CONFIG = {
            PLAYER: {
                SPEED: 0.1,
                HEIGHT: 1.7,
                HEALTH: 100,
                LOOK_SENSITIVITY: 0.002
            },
            BULLET: {
                SPEED: 0.8,
                DAMAGE: 25,
                RANGE: 100,
                SIZE: 0.05,
                SPREAD: 0.01
            },
            MONSTERS: {
                NORMAL: { SIZE: 1, SPEED: 0.015, HEALTH: 1, SCORE: 10, COLOR: 0xff4757 },
                FAST: { SIZE: 0.8, SPEED: 0.025, HEALTH: 1, SCORE: 20, COLOR: 0xff9ff3 },
                TANK: { SIZE: 1.5, SPEED: 0.008, HEALTH: 3, SCORE: 50, COLOR: 0xff9f43 }
            },
            FLOOR_SIZE: 200,
            SPAWN_DISTANCE: 30,
            MAX_MONSTERS: 50,
            FOG_COLOR: 0x0a0a1a,
            FOG_NEAR: 1,
            FOG_FAR: 100
        };
        
        // ========== ИНИЦИАЛИЗАЦИЯ THREE.JS ==========
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(CONFIG.FOG_COLOR, CONFIG.FOG_NEAR, CONFIG.FOG_FAR);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = CONFIG.PLAYER.HEIGHT;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('gameContainer').appendChild(renderer.domElement);
        
        // ========== ОСВЕЩЕНИЕ ==========
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        // ========== МИР ==========
        
        // Пол
        const floorGeometry = new THREE.PlaneGeometry(CONFIG.FLOOR_SIZE, CONFIG.FLOOR_SIZE, 50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a3a,
            roughness: 0.9,
            metalness: 0.1
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        
        // Случайные высоты для пола (создаем холмы)
        const positionAttribute = floor.geometry.getAttribute('position');
        for (let i = 0; i < positionAttribute.count; i++) {
            const x = positionAttribute.getX(i);
            const z = positionAttribute.getZ(i);
            const distance = Math.sqrt(x * x + z * z);
            const height = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 3;
            positionAttribute.setY(i, height);
        }
        floor.geometry.computeVertexNormals();
        scene.add(floor);
        
        // Облака тумана
        for (let i = 0; i < 20; i++) {
            const cloudGeometry = new THREE.SphereGeometry(Math.random() * 3 + 2, 8, 8);
            const cloudMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x1e90ff,
                transparent: true,
                opacity: 0.05
            });
            const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
            
            cloud.position.set(
                (Math.random() - 0.5) * CONFIG.FLOOR_SIZE,
                Math.random() * 10 + 5,
                (Math.random() - 0.5) * CONFIG.FLOOR_SIZE
            );
            scene.add(cloud);
        }
        
        // ========== ИГРОВЫЕ ОБЪЕКТЫ ==========
        let player = { 
            x: 0, 
            z: 0, 
            y: CONFIG.PLAYER.HEIGHT,
            rotation: { x: 0, y: 0 },
            velocity: { x: 0, z: 0 },
            health: CONFIG.PLAYER.HEALTH,
            onGround: true
        };
        
        let bullets = [];
        let monsters = [];
        let particles = [];
        let gameState = {
            score: 0,
            kills: 0,
            wave: 1,
            running: true,
            paused: false,
            lastShot: 0,
            shotCooldown: 300,
            monsterSpawnTimer: 0,
            monsterSpawnRate: 1500,
            mouseLocked: false
        };
        
        // ========== УПРАВЛЕНИЕ ==========
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };
        let touchJoystick = { active: false, x: 0, z: 0 };
        
        // Клавиатура
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            
            switch(key) {
                case 'r': restartGame(); break;
                case 'p': togglePause(); break;
                case ' ': shoot(); break;
                case 'escape': 
                    if (gameState.paused) togglePause();
                    if (gameState.mouseLocked) unlockMouse();
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // Мышь
        function lockMouse() {
            gameState.mouseLocked = true;
            document.body.requestPointerLock = document.body.requestPointerLock || 
                                               document.body.mozRequestPointerLock ||
                                               document.body.webkitRequestPointerLock;
            document.body.requestPointerLock();
            document.getElementById('gameContainer').style.cursor = 'none';
        }
        
        function unlockMouse() {
            gameState.mouseLocked = false;
            document.exitPointerLock = document.exitPointerLock || 
                                       document.mozExitPointerLock ||
                                       document.webkitExitPointerLock;
            document.exitPointerLock();
            document.getElementById('gameContainer').style.cursor = 'crosshair';
        }
        
        document.getElementById('gameContainer').addEventListener('click', () => {
            if (!gameState.mouseLocked && !gameState.paused) {
                lockMouse();
            }
        });
        
        document.addEventListener('pointerlockchange', lockChange);
        document.addEventListener('mozpointerlockchange', lockChange);
        
        function lockChange() {
            gameState.mouseLocked = document.pointerLockElement === document.body ||
                                   document.mozPointerLockElement === document.body;
        }
        
        document.addEventListener('mousemove', (e) => {
            if (gameState.mouseLocked && !gameState.paused) {
                const movementX = e.movementX || e.mozMovementX || 0;
                const movementY = e.movementY || e.mozMovementY || 0;
                
                player.rotation.y -= movementX * CONFIG.PLAYER.LOOK_SENSITIVITY;
                player.rotation.x -= movementY * CONFIG.PLAYER.LOOK_SENSITIVITY;
                
                // Ограничиваем вертикальный взгляд
                player.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.rotation.x));
            }
        });
        
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                mouse.down = true;
                shoot();
            }
        });
        
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouse.down = false;
        });
        
        // Сенсорное управление
        const mobileShootBtn = document.getElementById('mobileShootBtn');
        const movementHandle = document.getElementById('movementHandle');
        const weaponElement = document.getElementById('weapon');
        
        mobileShootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        });
        
        const movementArea = document.getElementById('movementArea');
        movementArea.addEventListener('touchstart', handleTouchStart);
        document.addEventListener('touchmove', handleTouchMove);
        document.addEventListener('touchend', handleTouchEnd);
        
        function handleTouchStart(e) {
            e.preventDefault();
            touchJoystick.active = true;
            updateTouchJoystick(e.touches[0]);
        }
        
        function handleTouchMove(e) {
            if (touchJoystick.active) {
                e.preventDefault();
                updateTouchJoystick(e.touches[0]);
            }
        }
        
        function handleTouchEnd(e) {
            if (touchJoystick.active) {
                touchJoystick.active = false;
                movementHandle.style.transform = 'translate(0, 0)';
                touchJoystick.x = 0;
                touchJoystick.z = 0;
            }
        }
        
        function updateTouchJoystick(touch) {
            const rect = movementArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const maxDistance = rect.width / 2 - 30;
            
            if (distance > maxDistance) {
                deltaX = (deltaX / distance) * maxDistance;
                deltaY = (deltaY / distance) * maxDistance;
            }
            
            movementHandle.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            
            touchJoystick.x = deltaX / maxDistance;
            touchJoystick.z = -deltaY / maxDistance;
        }
        
        // ========== ИГРОВЫЕ ФУНКЦИИ ==========
        function updatePlayer(deltaTime) {
            if (!gameState.running || gameState.paused) return;
            
            // Движение вперед/назад
            let moveForward = 0;
            let moveRight = 0;
            
            // Клавиатура
            if (keys['w'] || keys['arrowup']) moveForward = 1;
            if (keys['s'] || keys['arrowdown']) moveForward = -1;
            if (keys['a'] || keys['arrowleft']) moveRight = -1;
            if (keys['d'] || keys['arrowright']) moveRight = 1;
            
            // Сенсорное управление
            if (touchJoystick.active) {
                moveRight = touchJoystick.x;
                moveForward = touchJoystick.z;
            }
            
            // Применяем вращение к вектору движения
            const forwardX = Math.sin(player.rotation.y);
            const forwardZ = Math.cos(player.rotation.y);
            const rightX = Math.sin(player.rotation.y + Math.PI/2);
            const rightZ = Math.cos(player.rotation.y + Math.PI/2);
            
            player.velocity.x = (forwardX * moveForward + rightX * moveRight) * CONFIG.PLAYER.SPEED;
            player.velocity.z = (forwardZ * moveForward + rightZ * moveRight) * CONFIG.PLAYER.SPEED;
            
            // Обновляем позицию
            player.x += player.velocity.x;
            player.z += player.velocity.z;
            
            // Проверяем высоту пола в новой позиции
            const floorHeight = getFloorHeight(player.x, player.z);
            player.y = Math.max(CONFIG.PLAYER.HEIGHT, floorHeight + CONFIG.PLAYER.HEIGHT);
            
            // Ограничиваем движение по карте
            const halfFloor = CONFIG.FLOOR_SIZE / 2 - 10;
            player.x = Math.max(-halfFloor, Math.min(halfFloor, player.x));
            player.z = Math.max(-halfFloor, Math.min(halfFloor, player.z));
            
            // Автострельба
            if (mouse.down) {
                shoot();
            }
            
            // Обновляем камеру
            camera.position.set(player.x, player.y, player.z);
            
            // Вращение камеры
            camera.rotation.x = player.rotation.x;
            camera.rotation.y = player.rotation.y;
            camera.rotation.z = 0;
            
            // Обновляем UI
            document.getElementById('healthValue').textContent = player.health;
            document.getElementById('healthFill').style.width = (player.health / CONFIG.PLAYER.HEALTH * 100) + '%';
            document.getElementById('scoreValue').textContent = gameState.score;
            document.getElementById('killsValue').textContent = gameState.kills;
            document.getElementById('waveValue').textContent = gameState.wave;
        }
        
        function getFloorHeight(x, z) {
            // Простая функция для получения высоты пола
            return Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3;
        }
        
        function shoot() {
            if (!gameState.running || gameState.paused) return;
            
            const now = Date.now();
            if (now - gameState.lastShot < gameState.shotCooldown) return;
            gameState.lastShot = now;
            
            // Анимация оружия
            weaponElement.classList.add('shooting');
            setTimeout(() => {
                weaponElement.classList.remove('shooting');
            }, 100);
            
            // Создаем пулю из центра экрана
            const bulletDirection = new THREE.Vector3(0, 0, -1);
            
            // Применяем вращение камеры
            const euler = new THREE.Euler(player.rotation.x, player.rotation.y, 0, 'YXZ');
            bulletDirection.applyEuler(euler);
            
            // Добавляем разброс
            bulletDirection.x += (Math.random() - 0.5) * CONFIG.BULLET.SPREAD;
            bulletDirection.y += (Math.random() - 0.5) * CONFIG.BULLET.SPREAD;
            bulletDirection.normalize();
            
            // Создаем геометрию пули
            const bulletGeometry = new THREE.SphereGeometry(CONFIG.BULLET.SIZE, 8, 8);
            const bulletMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffa502,
                transparent: true,
                opacity: 0.8
            });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
            
            // Начальная позиция перед камерой
            bullet.position.copy(camera.position);
            bullet.position.y -= 0.2; // Немного ниже центра
            bullet.position.add(bulletDirection.clone().multiplyScalar(1));
            
            bullet.userData = {
                velocity: bulletDirection.multiplyScalar(CONFIG.BULLET.SPEED),
                damage: CONFIG.BULLET.DAMAGE,
                distance: 0
            };
            
            scene.add(bullet);
            bullets.push(bullet);
            
            // Эффект выстрела
            createMuzzleFlash();
            playSound('shoot');
        }
        
        function createMuzzleFlash() {
            // Создаем световую вспышку
            const flashLight = new THREE.PointLight(0xffa502, 2, 10);
            flashLight.position.copy(camera.position);
            flashLight.position.y -= 0.2;
            flashLight.position.z -= 1;
            scene.add(flashLight);
            
            // Быстро гаснущий свет
            setTimeout(() => {
                scene.remove(flashLight);
            }, 50);
        }
        
        function createMonster() {
            if (!gameState.running || gameState.paused || monsters.length >= CONFIG.MAX_MONSTERS) return;
            
            // Тип монстра
            let type;
            const rand = Math.random();
            
            if (gameState.wave >= 5 && rand < 0.15) {
                type = 'TANK';
            } else if (gameState.wave >= 3 && rand < 0.35) {
                type = 'FAST';
            } else {
                type = 'NORMAL';
            }
            
            const config = CONFIG.MONSTERS[type];
            
            // Случайная позиция вокруг игрока
            const angle = Math.random() * Math.PI * 2;
            const distance = CONFIG.SPAWN_DISTANCE + Math.random() * 15;
            const x = player.x + Math.cos(angle) * distance;
            const z = player.z + Math.sin(angle) * distance;
            const y = getFloorHeight(x, z) + config.SIZE;
            
            // Создаем монстра
            const geometry = new THREE.SphereGeometry(config.SIZE, 16, 16);
            const material = new THREE.MeshStandardMaterial({ 
                color: config.COLOR,
                roughness: 0.8,
                metalness: 0.2
            });
            const monster = new THREE.Mesh(geometry, material);
            
            monster.position.set(x, y, z);
            monster.castShadow = true;
            
            // Добавляем глаза
            const eyeGeometry = new THREE.SphereGeometry(config.SIZE * 0.15, 8, 8);
            const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(config.SIZE * 0.3, config.SIZE * 0.2, config.SIZE * 0.5);
            
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(-config.SIZE * 0.3, config.SIZE * 0.2, config.SIZE * 0.5);
            
            monster.add(leftEye, rightEye);
            
            monster.userData = {
                type: type,
                health: config.HEALTH * Math.max(1, Math.floor(gameState.wave / 3)),
                maxHealth: config.HEALTH * Math.max(1, Math.floor(gameState.wave / 3)),
                speed: config.SPEED + (gameState.wave * 0.001),
                score: config.SCORE,
                lastAttack: 0
            };
            
            scene.add(monster);
            monsters.push(monster);
        }
        
        function updateBullets(deltaTime) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                
                // Движение пули
                bullet.position.add(bullet.userData.velocity);
                bullet.userData.distance += CONFIG.BULLET.SPEED;
                
                // Проверка дистанции
                if (bullet.userData.distance > CONFIG.BULLET.RANGE) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Проверка столкновений с монстрами
                for (let j = monsters.length - 1; j >= 0; j--) {
                    const monster = monsters[j];
                    
                    const distance = bullet.position.distanceTo(monster.position);
                    const collisionDistance = CONFIG.BULLET.SIZE + monster.geometry.parameters.radius;
                    
                    if (distance < collisionDistance) {
                        // Попадание
                        monster.userData.health -= bullet.userData.damage;
                        
                        // Эффект попадания
                        createHitEffect(bullet.position, monster.material.color);
                        
                        // Удаляем пулю
                        scene.remove(bullet);
                        bullets.splice(i, 1);
                        
                        if (monster.userData.health <= 0) {
                            // Убийство монстра
                            gameState.score += monster.userData.score;
                            gameState.kills++;
                            
                            // Эффект смерти
                            createExplosion(monster.position, monster.material.color);
                            
                            // Удаляем монстра
                            scene.remove(monster);
                            monsters.splice(j, 1);
                            
                            playSound('death');
                            
                            // Проверка конца волны
                            if (monsters.length === 0) {
                                gameState.wave++;
                                spawnWave();
                            }
                        } else {
                            playSound('hit');
                        }
                        break;
                    }
                }
            }
        }
        
        function updateMonsters(deltaTime) {
            for (let i = monsters.length - 1; i >= 0; i--) {
                const monster = monsters[i];
                
                // Движение к игроку
                const dx = player.x - monster.position.x;
                const dz = player.z - monster.position.z;
                const distanceToPlayer = Math.sqrt(dx * dx + dz * dz);
                
                if (distanceToPlayer > 0) {
                    const direction = new THREE.Vector3(dx, 0, dz).normalize();
                    monster.position.add(direction.multiplyScalar(monster.userData.speed));
                    
                    // Обновляем высоту по полу
                    const floorHeight = getFloorHeight(monster.position.x, monster.position.z);
                    monster.position.y = floorHeight + monster.geometry.parameters.radius;
                    
                    // Поворот к игроку
                    monster.lookAt(player.x, monster.position.y, player.z);
                }
                
                // Проверка атаки на игрока
                if (distanceToPlayer < monster.geometry.parameters.radius + 1) {
                    const now = Date.now();
                    if (now - monster.userData.lastAttack > 1000) {
                        monster.userData.lastAttack = now;
                        
                        // Урон игроку
                        const damage = monster.userData.type === 'TANK' ? 30 : 20;
                        player.health -= damage;
                        
                        // Эффект получения урона
                        showDamageEffect();
                        createHitEffect(monster.position, new THREE.Color(0xff4757));
                        
                        playSound('hit');
                        
                        if (player.health <= 0) {
                            player.health = 0;
                            gameOver();
                        }
                    }
                }
            }
        }
        
        function showDamageEffect() {
            const overlay = document.getElementById('damageOverlay');
            overlay.style.opacity = '0.7';
            
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 300);
        }
        
        function createHitEffect(position, color) {
            // Создаем частицы
            const particleCount = 5;
            const particleGeometry = new THREE.SphereGeometry(0.1, 4, 4);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: color,
                    transparent: true,
                    opacity: 0.8
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                particle.position.copy(position);
                
                // Случайное направление
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.2
                );
                
                particle.userData = { velocity, life: 20 };
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function createExplosion(position, color) {
            // Создаем взрыв
            const particleCount = 20;
            const particleGeometry = new THREE.SphereGeometry(0.2, 6, 6);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: color,
                    transparent: true,
                    opacity: 0.8
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                particle.position.copy(position);
                
                // Случайное направление с большей силой
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    Math.random() * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                
                particle.userData = { velocity, life: 30 };
                scene.add(particle);
                particles.push(particle);
            }
            
            // Вспышка света
            const explosionLight = new THREE.PointLight(color, 3, 20);
            explosionLight.position.copy(position);
            scene.add(explosionLight);
            
            setTimeout(() => {
                scene.remove(explosionLight);
            }, 200);
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                
                particle.position.add(particle.userData.velocity);
                particle.userData.life--;
                particle.userData.velocity.y -= 0.01; // Гравитация
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                } else {
                    particle.material.opacity = particle.userData.life / 30;
                }
            }
        }
        
        function spawnWave() {
            const count = 5 + gameState.wave * 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => createMonster(), i * 500);
            }
        }
        
        // ========== ЗВУКИ ==========
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                switch(type) {
                    case 'shoot':
                        oscillator.frequency.value = 800;
                        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.1);
                        break;
                        
                    case 'death':
                        oscillator.frequency.value = 150;
                        gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.6);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.6);
                        break;
                        
                    case 'hit':
                        oscillator.frequency.value = 300;
                        gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.3);
                        break;
                }
            } catch (e) {
                console.log("Звук не поддерживается");
            }
        }
        
        // ========== ИГРОВОЙ ЦИКЛ ==========
        let lastTime = 0;
        
        function gameLoop(currentTime) {
            if (!gameState.running) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            const deltaTime = Math.min(0.1, (currentTime - lastTime) / 1000);
            lastTime = currentTime;
            
            if (!gameState.paused) {
                // Обновление
                updatePlayer(deltaTime);
                updateBullets(deltaTime);
                updateMonsters(deltaTime);
                updateParticles();
                
                // Спавн монстров
                const now = Date.now();
                if (now - gameState.monsterSpawnTimer > gameState.monsterSpawnRate) {
                    createMonster();
                    gameState.monsterSpawnTimer = now;
                    gameState.monsterSpawnRate = Math.max(500, 1500 - gameState.wave * 50);
                }
            }
            
            // Рендеринг
            renderer.render(scene, camera);
            
            // Продолжаем цикл
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState.running = false;
            unlockMouse();
            
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalKills').textContent = gameState.kills;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function restartGame() {
            // Очищаем сцену
            while (scene.children.length > 0) {
                scene.remove(scene.children[0]);
            }
            
            // Восстанавливаем сцену
            scene.add(ambientLight, directionalLight, floor);
            
            // Сбрасываем массивы
            bullets = [];
            monsters = [];
            particles = [];
            
            // Сбрасываем игрока
            player = { 
                x: 0, 
                z: 0, 
                y: CONFIG.PLAYER.HEIGHT,
                rotation: { x: 0, y: 0 },
                velocity: { x: 0, z: 0 },
                health: CONFIG.PLAYER.HEALTH,
                onGround: true
            };
            
            gameState.score = 0;
            gameState.kills = 0;
            gameState.wave = 1;
            gameState.running = true;
            gameState.paused = false;
            
            // Обновляем UI
            document.getElementById('healthValue').textContent = player.health;
            document.getElementById('healthFill').style.width = '100%';
            document.getElementById('scoreValue').textContent = gameState.score;
            document.getElementById('killsValue').textContent = gameState.kills;
            document.getElementById('waveValue').textContent = gameState.wave;
            
            // Скрываем экраны
            document.getElementById('pauseScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            // Блокируем мышь для ПК
            if (!isMobile()) {
                lockMouse();
            }
            
            // Начинаем первую волну
            spawnWave();
        }
        
        function togglePause() {
            gameState.paused = !gameState.paused;
            document.getElementById('pauseScreen').style.display = gameState.paused ? 'flex' : 'none';
            
            if (gameState.paused && gameState.mouseLocked) {
                unlockMouse();
            } else if (!gameState.paused && !isMobile()) {
                lockMouse();
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        // UI элементы
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pauseRestartBtn = document.getElementById('pauseRestartBtn');
        
        resumeBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);
        pauseRestartBtn.addEventListener('click', restartGame);
        
        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Определение мобильного устройства
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        // Настройки для мобильных
        if (isMobile()) {
            CONFIG.PLAYER.SPEED = 0.15;
            CONFIG.PLAYER.LOOK_SENSITIVITY = 0.005;
            gameState.shotCooldown = 400;
        }
        
        // Запуск игры
        restartGame();
        gameLoop();
        
        // Автоблокировка мыши при загрузке (для ПК)
        if (!isMobile()) {
            setTimeout(() => {
                if (!gameState.paused) {
                    lockMouse();
                }
            }, 1000);
        }
    </script>
</body>
